<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LT Build</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css">
  <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
  <script src="https://code.iconify.design/3/3.1.1/iconify.min.js"></script>
</head>
<body>
  <div class="page-container">
    <header class="header">
      <img class="logo" src="/lt-build.jpg"/>
      <nav class="nav">
        <a href="https://www.facebook.com/p/LT-Build-100064135176321/" target="_blank">Reviews</a>
        <a href="mailto:ltbuild99@gmail.com">Contact</a>
      </nav>
    </header>

    <section id="intro" class="intro-section section intro">
      <h1 class="section-heading centered-text">LT Build Construction Services</h1>
      <h2 class="section-heading centered-text">North Wales</h2>
      <h4 style="text-align: center; margin: 1rem;">
        Denbighshire · Flintshire · Wrexham
      </h4>
    </section>
    
    <section id="services-gallery" class="services-section section">
    <h2 class="section-heading">Our Services</h2>
    <hr>
    <div class="services-gallery-grid">
        <div id="services" class="services"></div>
        <div class="swiper gallery-swiper">

          <div class="swiper-wrapper">
            <div class="swiper-slide"><img src="gallery/ltb1.jpg"></div>
            <div class="swiper-slide"><img src="gallery/ltb2.jpg"></div>
            <div class="swiper-slide"><img src="gallery/ltb3.jpg"></div>
          </div>
          <!-- Optional but recommended -->
          <div class="swiper-pagination"></div>
        </div>
      </div>
    </section>

    <section id="contact" class="contact-section section">
      <h2 class="section-heading">Contact Us</h2>
      <hr>
      <h4>All aspects of building work undertaken - no job too big or small!</h4>
      <h4>Enquire for a free quote:</h4>
      <a href="mailto:ltbuild99@gmail.com" class="icon-text centered-content p-link"><span class="iconify" data-icon="line-md:email"></span> ltbuild99@gmail.com</a>
      <p class="icon-text centered-content"><span class="iconify" data-icon="solar:phone-linear"></span> 07435 655405</p>
   </section>
  
  </div>

  <script src="services.js"></script>

  <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
  <script>
    new Swiper('.gallery-swiper', {
      loop: true,
      autoplay: {
        delay: 3000,
        disableOnInteraction: false
      },
      pagination: {
        el: '.swiper-pagination',
        clickable: true
      },
      slidesPerView: 1,
      spaceBetween: 10
    });
  </script>

</body>
</html>
